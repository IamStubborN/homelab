services:
  homeassistant:
    build:
      context: .
    image: homelab-homeassistant
    container_name: homeassistant
    restart: unless-stopped
    privileged: true
    network_mode: host
    environment:
      TZ: ${TIMEZONE:-UTC}
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8123/manifest.json >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    volumes:
      - ./config:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro

  tailscale-homeassistant:
    image: tailscale/tailscale:latest
    container_name: tailscale-homeassistant
    hostname: homeassistant
    restart: unless-stopped
    network_mode: host
    environment:
      TS_HOSTNAME: homeassistant
      TS_STATE_DIR: /var/lib/tailscale
      TS_AUTH_ONCE: "true"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "tailscale", "status", "--peers=false"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    volumes:
      - ./tailscale-state:/var/lib/tailscale
