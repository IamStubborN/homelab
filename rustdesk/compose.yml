services:
  hbbs:
    container_name: rustdesk-hbbs
    image: rustdesk/rustdesk-server:latest
    command: hbbs
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./data:/root
    network_mode: "host"
    depends_on:
      - hbbr

  hbbr:
    container_name: rustdesk-hbbr
    image: rustdesk/rustdesk-server:latest
    command: hbbr
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./data:/root
    network_mode: "host"
