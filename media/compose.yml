  gluetun-watcher:
    image: docker:cli
    container_name: gluetun-watcher
    restart: always
    security_opt:
      - no-new-privileges:true
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      - PARENT_CONTAINER=gluetun
      - DEPENDENT_CONTAINERS=qbittorrent prowlarr speedtest-tracker-vpn
      - HEALTH_TIMEOUT=120
      - SETTLE_DELAY=10
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./gluetun-watcher/watch.sh:/watch.sh:ro
      - ${HOMELAB_ROOT:-/opt/homelab}:${HOMELAB_ROOT:-/opt/homelab}:ro
    entrypoint: ["sh", "/watch.sh"]

  plex-orphan-watcher:
    image: ${PLEX_ORPHAN_WATCHER_IMAGE:-ghcr.io/iamstubborn/plex-orphan-watcher:0.4.2@sha256:1cc9312cb3c27647b70d4f0bed7c35b17070cb681da0b333bf6f104faa77a6d5}
    container_name: plex-orphan-watcher
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      plex:
        condition: service_healthy
    environment:
      - PLEX_URL=http://plex:32400
      - PLEX_TOKEN_FILE=/run/secrets/plex_token
      - DELETE_ROOTS=/data/internal/media,/data/usb_drive/media
      - AUDIT_ROOTS=/data/internal/torrents,/data/usb_drive/torrents
      - STATE_PATH=/state/watcher.db
      - DRY_RUN=true
      - SETTLE_DELAY=15m
      - RECONCILE_INTERVAL=1h
      - HEALTH_ADDRESS=:8080
    volumes:
      - ./plex-orphan-watcher/state:/state
      - ${INTERNAL_STORAGE:-/mnt/internal}/media:/data/internal/media:ro
      - ${USB_STORAGE:-/mnt/usb_drive}/media:/data/usb_drive/media:ro
      - ${INTERNAL_STORAGE:-/mnt/internal}/torrents:/data/internal/torrents:ro
      - ${USB_STORAGE:-/mnt/usb_drive}/torrents:/data/usb_drive/torrents:ro
    secrets:
      - plex_token
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
      - "deunhealth.restart.on.unhealthy=true"
    networks:
      - proxy

  plex:
    image: linuxserver/plex:latest
    container_name: plex
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    devices:
      - /dev/dri:/dev/dri
    ports:
      - 32400:32400
    environment:
      - PUID=1000
      - PGID=1000
      - VERSION=docker
      - TZ=${TIMEZONE:-UTC}
      - PLEX_CLAIM=${PLEX_CLAIM}
    volumes:
      - ./plex/config:/config
      - /etc/localtime:/etc/localtime:ro
      - /dev/shm:/transcode
      - ${INTERNAL_STORAGE:-/mnt/internal}:/data/internal
      - ${USB_STORAGE:-/mnt/usb_drive}:/data/usb_drive
    healthcheck:
      test: "curl -sf http://localhost:32400/identity || exit 1"
      interval: 1m
      timeout: 10s
      retries: 3
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "deunhealth.restart.on.unhealthy=true"
      - "traefik.enable=true"
      - "traefik.http.routers.plex.tls=true"
      - "traefik.http.routers.plex.entrypoints=http,https"
      - "traefik.http.routers.plex.service=plex"
      - "traefik.http.routers.plex.rule=Host(`plex.${DOCKER_DOMAIN}`)"
      - "traefik.http.services.plex.loadbalancer.server.port=32400"
    networks:
      - proxy


  plex-auto-languages:
    image: ghcr.io/journeydocker/plex-auto-languages:latest
    container_name: plex-auto-languages
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - PLEX_URL=http://plex:32400
      - PLEX_TOKEN_FILE=/run/secrets/plex_token
      - TZ=${TIMEZONE:-UTC}
      - UPDATE_LEVEL=show
      - UPDATE_STRATEGY=all
      - TRIGGER_ON_PLAY=true
      - TRIGGER_ON_SCAN=false
      - SCHEDULER_ENABLE=false
      - DEBUG=true
    volumes:
      - ./plex-auto-languages/config:/config
      - ./plex-auto-languages/logs:/logs
    secrets:
      - plex_token
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

    networks:
      - proxy


  media-preview-generator:
    image: stevezzau/media_preview_generator:latest
    container_name: media-preview-generator
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      plex:
        condition: service_healthy
    devices:
      - /dev/dri:/dev/dri
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIMEZONE:-UTC}
    volumes:
      - ./media-preview-generator/config:/config
      - ./plex/config:/plex:rw
      - /etc/localtime:/etc/localtime:ro
      - ${INTERNAL_STORAGE:-/mnt/internal}:/data/internal:ro
      - ${USB_STORAGE:-/mnt/usb_drive}:/data/usb_drive:ro
    healthcheck:
      test: "curl -sf http://localhost:8080/api/health || curl -sf http://localhost:8080/api/system/status || exit 1"
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "deunhealth.restart.on.unhealthy=true"
      - "traefik.enable=true"
      - "traefik.http.routers.media-preview.tls=true"
      - "traefik.http.routers.media-preview.entrypoints=http,https"
      - "traefik.http.routers.media-preview.service=media-preview"
      - "traefik.http.routers.media-preview.rule=Host(`media-preview.${DOCKER_DOMAIN}`)"
      - "traefik.http.services.media-preview.loadbalancer.server.port=8080"
    networks:
      - proxy

