name: media-orchestrator

x-media-profile: &media-profile
  profiles:
    - media-orchestrator

x-locked-down: &locked-down
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

x-service-environment: &service-environment
  MEDIA_DATABASE_URL: ${MEDIA_DATABASE_URL:?set media database URL}
  MEDIA_ANDRII_TOKEN: ${MEDIA_ANDRII_TOKEN:?set Andrii API token}
  MEDIA_VALENTYNA_TOKEN: ${MEDIA_VALENTYNA_TOKEN:?set Valentyna API token}
  MEDIA_RUNNER_TOKEN: ${MEDIA_RUNNER_TOKEN:?set runner API token}
  MEDIA_ANDRII_WEBHOOK_HMAC: ${MEDIA_ANDRII_WEBHOOK_HMAC:?set Andrii webhook HMAC}
  MEDIA_VALENTYNA_WEBHOOK_HMAC: ${MEDIA_VALENTYNA_WEBHOOK_HMAC:?set Valentyna webhook HMAC}
  MEDIA_LISTEN_ADDR: 0.0.0.0:8080
  MEDIA_PROWLARR_URL: http://gluetun:9696
  MEDIA_PROWLARR_API_KEY: ${MEDIA_PROWLARR_API_KEY:?set Prowlarr API key}
  MEDIA_REZKA_MIRRORS: ${MEDIA_REZKA_MIRRORS:?set comma-separated HTTPS Rezka mirrors}
  MEDIA_REZKA_SESSION_PROBE_URL: ${MEDIA_REZKA_SESSION_PROBE_URL:?set the HTTPS session probe URL}
  MEDIA_REZKA_SESSION_VALID_MARKERS_JSON: ${MEDIA_REZKA_SESSION_VALID_MARKERS_JSON:?set valid session markers JSON}
  MEDIA_REZKA_SESSION_INVALID_MARKERS_JSON: ${MEDIA_REZKA_SESSION_INVALID_MARKERS_JSON:?set invalid session markers JSON}
  MEDIA_REZKA_USERNAME: ${MEDIA_REZKA_USERNAME:?set Rezka username}
  MEDIA_REZKA_PASSWORD: ${MEDIA_REZKA_PASSWORD:?set Rezka password}
  MEDIA_REZKA_COOKIE_KEY: ${MEDIA_REZKA_COOKIE_KEY:?set Rezka cookie key}
  MEDIA_REZKA_SESSION_STORE_FILE: /var/lib/media-orchestrator/session/session.bin
  MEDIA_PLEX_URL: http://plex:32400
  MEDIA_PLEX_TOKEN: ${MEDIA_PLEX_TOKEN:?set Plex token}
  MEDIA_PLEX_TV_SECTION: ${MEDIA_PLEX_TV_SECTION:?set Plex TV section ID}
  MEDIA_PLEX_MOVIES_SECTION: ${MEDIA_PLEX_MOVIES_SECTION:?set Plex movies section ID}
  RUST_LOG: ${MEDIA_RUST_LOG:-info}
  TZ: ${TIMEZONE:-UTC}

services:
  media-postgres:
    <<: [*media-profile, *locked-down]
    image: ${MEDIA_POSTGRES_IMAGE:?set MEDIA_POSTGRES_IMAGE to an immutable PostgreSQL tag or digest}
    container_name: media-postgres
    restart: unless-stopped
    read_only: true
    cap_add:
      # Required by the official entrypoint to initialize and drop to postgres.
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    environment:
      POSTGRES_DB: ${MEDIA_POSTGRES_DB:-media_orchestrator}
      POSTGRES_USER: ${MEDIA_POSTGRES_USER:-media}
      POSTGRES_PASSWORD: ${MEDIA_POSTGRES_PASSWORD:?set media PostgreSQL password}
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: ${TIMEZONE:-UTC}
    volumes:
      - type: volume
        source: media_postgres_data
        target: /var/lib/postgresql/data
        volume:
          nocopy: true
    tmpfs:
      - /run/postgresql:size=16m,mode=0770
      - /tmp:size=64m,mode=1777
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - media-db

  media-migrate:
    <<: [*media-profile, *locked-down]
    image: ${MEDIA_SERVICE_IMAGE:?set MEDIA_SERVICE_IMAGE to an immutable media-orchestrator tag or digest}
    container_name: media-migrate
    user: ${PUID:-1000}:${PGID:-1000}
    command:
      - migrate
    restart: "no"
    read_only: true
    environment:
      MEDIA_DATABASE_URL: ${MEDIA_DATABASE_URL:?set media database URL}
      RUST_LOG: ${MEDIA_RUST_LOG:-info}
      TZ: ${TIMEZONE:-UTC}
    tmpfs:
      - /tmp:size=32m,mode=1777
    depends_on:
      media-postgres:
        condition: service_healthy
    networks:
      - media-db

  media-session-init:
    <<: [*media-profile, *locked-down]
    image: ${MEDIA_SERVICE_IMAGE:?set MEDIA_SERVICE_IMAGE to an immutable media-orchestrator tag or digest}
    container_name: media-session-init
    user: "0:0"
    cap_add:
      - CHOWN
    entrypoint:
      - /bin/chown
    command:
      - -R
      - ${PUID:-1000}:${PGID:-1000}
      - /var/lib/media-orchestrator/service-session
      - /var/lib/media-orchestrator/runner-session
    restart: "no"
    read_only: true
    volumes:
      - rezka_service_session_encrypted:/var/lib/media-orchestrator/service-session
      - rezka_session_encrypted:/var/lib/media-orchestrator/runner-session

  media-service:
    <<: [*media-profile, *locked-down]
    image: ${MEDIA_SERVICE_IMAGE:?set MEDIA_SERVICE_IMAGE to an immutable media-orchestrator tag or digest}
    container_name: media-service
    user: ${PUID:-1000}:${PGID:-1000}
    command:
      - serve
    restart: unless-stopped
    read_only: true
    environment: *service-environment
    volumes:
      - type: volume
        source: rezka_service_session_encrypted
        target: /var/lib/media-orchestrator/session
        volume:
          nocopy: true
    expose:
      - "8080"
    tmpfs:
      - /tmp:size=64m,mode=1777
    healthcheck:
      test:
        - CMD
        - media
        - healthcheck
        - --url
        - http://127.0.0.1:8080/v1/ready
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      media-postgres:
        condition: service_healthy
      media-migrate:
        condition: service_completed_successfully
      media-session-init:
        condition: service_completed_successfully
    labels:
      traefik.enable: "false"
    networks:
      - media-db
      - media-private
      - media-internal
      - proxy

  gluetun-rezka:
    <<: [*media-profile, *locked-down]
    image: ${GLUETUN_REZKA_IMAGE:?set GLUETUN_REZKA_IMAGE to an immutable Gluetun tag or digest}
    container_name: gluetun-rezka
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - DAC_READ_SEARCH
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      TZ: ${TIMEZONE:-UTC}
      VPN_SERVICE_PROVIDER: protonvpn
      VPN_TYPE: wireguard
      WIREGUARD_PRIVATE_KEY_SECRETFILE: /run/secrets/gluetun_rezka_wireguard_private_key
      SERVER_COUNTRIES: ${GLUETUN_REZKA_SERVER_COUNTRIES:?set dedicated Rezka VPN countries}
      VPN_PORT_FORWARDING: "off"
      HEALTH_RESTART_VPN: "off"
      DNS_SERVER: "on"
      DNS_UPSTREAM_RESOLVERS: cloudflare,google
      BLOCK_MALICIOUS: "off"
      DNS_UPSTREAM_IPV6: "off"
      HTTP_CONTROL_SERVER_ADDRESS: 127.0.0.1:8000
      HTTP_CONTROL_SERVER_AUTH_CONFIG_FILEPATH: /run/secrets/gluetun_rezka_control_auth_config
    secrets:
      - gluetun_rezka_wireguard_private_key
      - gluetun_rezka_control_auth_config
    volumes:
      - type: volume
        source: gluetun_rezka_state
        target: /gluetun
        volume:
          nocopy: true
    healthcheck:
      test:
        - CMD
        - /gluetun-entrypoint
        - healthcheck
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      traefik.enable: "false"
    networks:
      - media-private
      - rezka-egress
      - rezka-credentials
      - proxy

  download-runner:
    <<: [*media-profile, *locked-down]
    image: ${DOWNLOAD_RUNNER_IMAGE:?set DOWNLOAD_RUNNER_IMAGE to an immutable media-orchestrator runner tag or digest}
    container_name: download-runner
    user: ${PUID:-1000}:${PGID:-1000}
    command:
      - runner
    restart: unless-stopped
    read_only: true
    network_mode: service:gluetun-rezka
    group_add:
      - ${RENDER_GID:-109}
      - ${VIDEO_GID:-44}
    devices:
      - /dev/dri:/dev/dri
    environment:
      MEDIA_SERVICE_URL: http://media-service:8080
      MEDIA_TOKEN: ${MEDIA_RUNNER_TOKEN:?set runner API token}
      MEDIA_REZKA_MIRRORS: ${MEDIA_REZKA_MIRRORS:?set comma-separated HTTPS Rezka mirrors}
      MEDIA_REZKA_SESSION_PROBE_URL: ${MEDIA_REZKA_SESSION_PROBE_URL:?set the HTTPS session probe URL}
      MEDIA_REZKA_SESSION_VALID_MARKERS_JSON: ${MEDIA_REZKA_SESSION_VALID_MARKERS_JSON:?set valid session markers JSON}
      MEDIA_REZKA_SESSION_INVALID_MARKERS_JSON: ${MEDIA_REZKA_SESSION_INVALID_MARKERS_JSON:?set invalid session markers JSON}
      MEDIA_REZKA_CREDENTIAL_BROKER_URL: http://vaultwarden-broker-andrii:8787
      MEDIA_REZKA_CREDENTIAL_BROKER_TOKEN: ${ANDRII_REZKA_BROKER_TOKEN:?set Andrii Rezka credential broker token}
      MEDIA_REZKA_CREDENTIAL_BROKER_PRIVATE_HTTP_HOSTS: vaultwarden-broker-andrii
      MEDIA_REZKA_COOKIE_KEY: ${MEDIA_REZKA_COOKIE_KEY:?set Rezka cookie key}
      MEDIA_REZKA_SESSION_STORE_FILE: /var/lib/media-orchestrator/session/session.bin
      MEDIA_GLUETUN_URL: http://127.0.0.1:8000
      MEDIA_GLUETUN_API_KEY: ${GLUETUN_REZKA_CONTROL_API_KEY:?set dedicated Gluetun control API key}
      MEDIA_QBITTORRENT_URL: http://gluetun:8400
      MEDIA_QBITTORRENT_TV_CATEGORY: ${MEDIA_QBITTORRENT_TV_CATEGORY:?set existing TV category}
      MEDIA_QBITTORRENT_MOVIES_CATEGORY: ${MEDIA_QBITTORRENT_MOVIES_CATEGORY:?set existing movies category}
      MEDIA_QBITTORRENT_USERNAME: ${MEDIA_QBITTORRENT_USERNAME:?set qBittorrent username}
      MEDIA_QBITTORRENT_PASSWORD: ${MEDIA_QBITTORRENT_PASSWORD:?set qBittorrent password}
      MEDIA_STAGING_ROOT: /data/internal/media-orchestrator/staging/rezka
      MEDIA_TV_ROOT: /data/internal/media/rezka/tv
      MEDIA_MOVIES_ROOT: /data/internal/media/rezka/movies
      MEDIA_STORAGE_RESERVE_BYTES: "21474836480"
      RUST_LOG: ${MEDIA_RUST_LOG:-info}
      TZ: ${TIMEZONE:-UTC}
    volumes:
      # One bind mount preserves atomic rename between staging and Plex roots.
      - type: bind
        source: ${INTERNAL_STORAGE:?set INTERNAL_STORAGE to the storage root}
        target: /data/internal
        bind:
          create_host_path: false
      - type: volume
        source: rezka_session_encrypted
        target: /var/lib/media-orchestrator/session
        volume:
          nocopy: true
    tmpfs:
      - /tmp:size=1g,mode=1777
      - /run/media-orchestrator:size=16m,mode=0700
    healthcheck:
      test:
        - CMD
        - media
        - healthcheck
        - --url
        - http://media-service:8080/v1/health
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      gluetun-rezka:
        condition: service_healthy
      media-service:
        condition: service_healthy
      media-session-init:
        condition: service_completed_successfully

  gluetun-rezka-watcher:
    <<: [*media-profile, *locked-down]
    image: ${GLUETUN_REZKA_WATCHER_IMAGE:?set GLUETUN_REZKA_WATCHER_IMAGE to an immutable Docker CLI tag or digest}
    container_name: gluetun-rezka-watcher
    restart: unless-stopped
    read_only: true
    network_mode: none
    environment:
      PARENT_CONTAINER: gluetun-rezka
      DEPENDENT_CONTAINER: download-runner
      HEALTH_TIMEOUT: "120"
      SETTLE_DELAY: "10"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./gluetun-rezka-watcher/watch.sh:/watch.sh:ro
    tmpfs:
      - /tmp:size=16m,mode=1777
    entrypoint:
      - /bin/sh
      - /watch.sh
    healthcheck:
      test:
        - CMD
        - docker
        - info
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      gluetun-rezka:
        condition: service_healthy

secrets:
  gluetun_rezka_wireguard_private_key:
    file: ${MEDIA_SECRETS_DIR:?set MEDIA_SECRETS_DIR}/gluetun_rezka_wireguard_private_key
  gluetun_rezka_control_auth_config:
    file: ${MEDIA_SECRETS_DIR:?set MEDIA_SECRETS_DIR}/gluetun_rezka_control_auth_config

volumes:
  media_postgres_data:
  gluetun_rezka_state:
  rezka_session_encrypted:
  rezka_service_session_encrypted:

networks:
  media-db:
    internal: true
  media-private:
    internal: true
  media-internal:
    name: ${MEDIA_NETWORK:-media-internal}
    external: true
  rezka-egress:
  rezka-credentials:
    name: rezka-credentials
    external: true
  proxy:
    external: true
