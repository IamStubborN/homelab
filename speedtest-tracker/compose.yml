services:
  speedtest-tracker:
    image: lscr.io/linuxserver/speedtest-tracker:latest
    container_name: speedtest-tracker
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    environment:
      PUID: "1000"
      PGID: "1000"
      APP_URL: https://speedtest.${DOCKER_DOMAIN}
      ASSET_URL: https://speedtest.${DOCKER_DOMAIN}
      DB_CONNECTION: sqlite
      DISPLAY_TIMEZONE: ${TIMEZONE:-UTC}
      APP_TIMEZONE: ${TIMEZONE:-UTC}
      PUBLIC_DASHBOARD: "true"
      SPEEDTEST_SCHEDULE: "17 */6 * * *"
      SPEEDTEST_INTERNET_CHECK_HOSTNAME: one.one.one.one
    volumes:
      - ./config:/config
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.speedtest-tracker.tls=true"
      - "traefik.http.routers.speedtest-tracker.entrypoints=http,https"
      - "traefik.http.routers.speedtest-tracker.rule=Host(`speedtest.${DOCKER_DOMAIN}`)"
      - "traefik.http.services.speedtest-tracker.loadbalancer.server.port=80"
    networks:
      - proxy

networks:
  proxy:
    external: true
