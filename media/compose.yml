services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    # line above must be uncommented to allow external containers to connect.
    # See https://github.com/qdm12/gluetun-wiki/blob/main/setup/connect-a-container-to-gluetun.md#external-container-to-gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - 6881:6881 # qBittorrent
      - 6881:6881/udp # qBittorrent
      # - 7878:7878 # Radarr
      # - 8989:8989 # Sonarr
      # - 6767:6767 # Bazarr
      # - 8686:8686 # Lidarr
      # - 8787:8787 # Readarr
      # - 5055:5055 # Overseerr
      # - 32400:32400 # Plex (moved to plex container)
      # - 1900:1900/udp # Plex
      # - 32410:32410/udp # Plex
      # - 32411:32411/udp # Plex
      # - 32412:32412/udp # Plex
      # - 32413:32413/udp # Plex
      # - 32414:32414/udp # Plex
      # - 32469:32469/tcp # Plex
      # - 8096:8096 # Jellyfin
    volumes:
      - ./gluetun/data:/gluetun
      - ./gluetun/scripts:/scripts:ro
    healthcheck:
      test: [ "CMD-SHELL", "/scripts/healthcheck.sh" ]
      interval: 20s
      timeout: 15s
      retries: 2
      start_period: 60s
    environment:
      - TZ=${TIMEZONE:-UTC} # Specify your timezone here
      - VPN_SERVICE_PROVIDER=protonvpn # Specify your VPN provider here
      - VPN_TYPE=wireguard # Specify your VPN type here
      - PORT_FORWARD_ONLY=on # Use only ProtonVPN servers with port forwarding
      - SERVER_COUNTRIES=Bulgaria # ProtonVPN preferred country
      - WIREGUARD_PRIVATE_KEY_SECRETFILE=/run/secrets/protonvpn_wireguard_private_key
      - UPDATER_PERIOD=6h
      - DNS_SERVER=on
      - DNS_UPSTREAM_RESOLVERS=cloudflare,google
      - BLOCK_MALICIOUS=off
      - DNS_UPSTREAM_IPV6=off
      # Control server must be reachable cross-container (Glance VPN widget) but
      # is locked down with an apikey; see gluetun/control-auth-config.example.toml.
      - HTTP_CONTROL_SERVER_ADDRESS=:8000
      - HTTP_CONTROL_SERVER_AUTH_CONFIG_FILEPATH=/run/secrets/gluetun_control_auth_config
      - VPN_PORT_FORWARDING=on
      - VPN_PORT_FORWARDING_STATUS_FILE=/gluetun/forwarded_port
      # - DNS_ADDRESS=${DNS_ADDRESS:-192.0.2.1}
      # - FIREWALL_OUTBOUND_SUBNETS=${LAN_SUBNET:-192.0.2.0/24}
      # - DNS_ADDRESS=${ALT_DNS_ADDRESS:-198.51.100.1}
      # - FIREWALL_OUTBOUND_SUBNETS=${ALT_LAN_SUBNET:-198.51.100.0/24}
    secrets:
      - protonvpn_wireguard_private_key
      - gluetun_control_auth_config
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "traefik.enable=true"

      - "traefik.http.routers.qbittorrent.tls=true"
      - "traefik.http.routers.qbittorrent.entrypoints=http,https"
      - "traefik.http.routers.qbittorrent.service=qbittorrent"
      - "traefik.http.routers.qbittorrent.rule=Host(`qbittorrent.${DOCKER_DOMAIN}`)"
      - "traefik.http.services.qbittorrent.loadbalancer.server.port=8400"

      - "traefik.http.routers.prowlarr.tls=true"
      - "traefik.http.routers.prowlarr.entrypoints=http,https"
      - "traefik.http.routers.prowlarr.service=prowlarr"
      - "traefik.http.routers.prowlarr.rule=Host(`prowlarr.${DOCKER_DOMAIN}`)"
      - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"


      - "traefik.http.routers.speedtest-vpn.tls=true"
      - "traefik.http.routers.speedtest-vpn.entrypoints=http,https"
      - "traefik.http.routers.speedtest-vpn.service=speedtest-vpn"
      - "traefik.http.routers.speedtest-vpn.rule=Host(`speedtest-vpn.${DOCKER_DOMAIN}`)"
      - "traefik.http.services.speedtest-vpn.loadbalancer.server.port=80"

      # - "traefik.http.routers.radarr.tls=true"
      # - "traefik.http.routers.radarr.entrypoints=http,https"
      # - "traefik.http.routers.radarr.service=radarr"
      # - "traefik.http.routers.radarr.rule=Host(`radarr.${DOCKER_DOMAIN}`)"
      # - "traefik.http.services.radarr.loadbalancer.server.port=7878"

      # - "traefik.http.routers.sonarr.tls=true"
      # - "traefik.http.routers.sonarr.entrypoints=http,https"
      # - "traefik.http.routers.sonarr.service=sonarr"
      # - "traefik.http.routers.sonarr.rule=Host(`sonarr.${DOCKER_DOMAIN}`)"
      # - "traefik.http.services.sonarr.loadbalancer.server.port=8989"

      # - "traefik.http.routers.bazarr.tls=true"
      # - "traefik.http.routers.bazarr.entrypoints=http,https"
      # - "traefik.http.routers.bazarr.service=bazarr"
      # - "traefik.http.routers.bazarr.rule=Host(`bazarr.${DOCKER_DOMAIN}`)"
      # - "traefik.http.services.bazarr.loadbalancer.server.port=6767"

      # - "traefik.http.routers.lidarr.tls=true"
      # - "traefik.http.routers.lidarr.entrypoints=http,https"
      # - "traefik.http.routers.lidarr.service=lidarr"
      # - "traefik.http.routers.lidarr.rule=Host(`lidarr.${DOCKER_DOMAIN}`)"
      # - "traefik.http.services.lidarr.loadbalancer.server.port=8686"

      # - "traefik.http.routers.readarr.tls=true"
      # - "traefik.http.routers.readarr.entrypoints=http,https"
      # - "traefik.http.routers.readarr.service=readarr"
      # - "traefik.http.routers.readarr.rule=Host(`readarr.${DOCKER_DOMAIN}`)"
      # - "traefik.http.services.readarr.loadbalancer.server.port=8787"

      # - "traefik.http.routers.overseerr.tls=true"
      # - "traefik.http.routers.overseerr.entrypoints=http,https"
      # - "traefik.http.routers.overseerr.service=overseerr"
      # - "traefik.http.routers.overseerr.rule=Host(`overseerr.${DOCKER_DOMAIN}`)"
      # - "traefik.http.services.overseerr.loadbalancer.server.port=5055"

      # Plex labels moved to plex container
      # - "traefik.http.routers.plex.tls=true"
      # - "traefik.http.routers.plex.entrypoints=http,https"
      # - "traefik.http.routers.plex.service=plex"
      # - "traefik.http.routers.plex.rule=Host(`plex.${DOCKER_DOMAIN}`)"
      # - "traefik.http.services.plex.loadbalancer.server.port=32400"

      # - "traefik.http.routers.jellyfin.tls=true"
      # - "traefik.http.routers.jellyfin.entrypoints=http,https"
      # - "traefik.http.routers.jellyfin.service=jellyfin"
      # - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.${DOCKER_DOMAIN}`)"
      # - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"

      - "deunhealth.restart.on.unhealthy=true"
    networks:
      - proxy
    security_opt:
      - no-new-privileges:true

  qbittorrent:
    container_name: qbittorrent
    image: linuxserver/qbittorrent:latest
    network_mode: 'service:gluetun'
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      gluetun:
        condition: service_healthy
        restart: true
    healthcheck:
      test: [ "CMD-SHELL", "/scripts/healthcheck.sh" ]
      interval: 20s
      timeout: 15s
      retries: 2
      start_period: 60s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "deunhealth.restart.on.unhealthy=true"
    environment:
      - PUID=1000
      - PGID=1000
      - UNMASK=002
      - TZ=${TIMEZONE:-UTC}
      - WEBUI_PORT=8400
    secrets:
      - gluetun_control_api_key
    volumes:
      - ./qbittorrent/config:/config
      - ./qbittorrent/ui:/ui
      - ./qbittorrent/scripts:/scripts
      - ./gluetun/data/forwarded_port:/gluetun/forwarded_port:ro
      - /etc/localtime:/etc/localtime:ro
      - ${INTERNAL_STORAGE:-/mnt/internal}/torrents:/data/internal/torrents
      - ${USB_STORAGE:-/mnt/usb_drive}/torrents:/data/usb_drive/torrents

  qbittorrent-port-sync:
    image: alpine:3.23
    container_name: qbittorrent-port-sync
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      gluetun:
        condition: service_healthy
      qbittorrent:
        condition: service_started
    environment:
      - QBITTORRENT_URL=http://gluetun:8400
      - FORWARDED_PORT_FILE=/gluetun/forwarded_port
      - SYNC_STATE_FILE=/tmp/synced_port
      - POLL_INTERVAL=5
    volumes:
      - ./qbittorrent/scripts/port-sync.sh:/scripts/port-sync.sh:ro
      - ./gluetun/data/forwarded_port:/gluetun/forwarded_port:ro
    tmpfs:
      - /tmp:size=1m,mode=1777
    entrypoint: ["sh", "/scripts/port-sync.sh"]
    healthcheck:
      test: ["CMD-SHELL", "test -s /tmp/synced_port && test \"$$(cat /tmp/synced_port)\" = \"$$(tr -dc '0-9' < /gluetun/forwarded_port)\""]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "deunhealth.restart.on.unhealthy=true"
    networks:
      - proxy

  prowlarr:
    container_name: prowlarr
    image: linuxserver/prowlarr:latest
    network_mode: "service:gluetun"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      gluetun:
        condition: service_healthy
        restart: true
    environment:
      - PUID=1000
      - PGID=1000
      - UNMASK=002
      - TZ=${TIMEZONE:-UTC}
      - DOTNET_SYSTEM_NET_DISABLEIPV6=1
    healthcheck:
      test: "curl -sf http://localhost:9696/ping || exit 1"
      interval: 30s
      timeout: 10s
      retries: 2
      start_period: 60s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "deunhealth.restart.on.unhealthy=true"
    volumes:
      - ./prowlarr/config:/config
      - /etc/localtime:/etc/localtime:ro

