x-firecrawl-environment: &firecrawl-environment
  REDIS_URL: redis://firecrawl-redis:6379
  REDIS_RATE_LIMIT_URL: redis://firecrawl-redis:6379
  PLAYWRIGHT_MICROSERVICE_URL: http://firecrawl-playwright:3000/scrape
  POSTGRES_USER: firecrawl
  POSTGRES_PASSWORD: ${FIRECRAWL_POSTGRES_PASSWORD:?set FIRECRAWL_POSTGRES_PASSWORD}
  POSTGRES_DB: postgres
  POSTGRES_HOST: firecrawl-postgres
  POSTGRES_PORT: "5432"
  USE_DB_AUTHENTICATION: "false"
  NUM_WORKERS_PER_QUEUE: "2"
  CRAWL_CONCURRENT_REQUESTS: "2"
  MAX_CONCURRENT_JOBS: "2"
  BROWSER_POOL_SIZE: "2"
  NUQ_RABBITMQ_URL: amqp://firecrawl-rabbitmq:5672
  BULL_AUTH_KEY: ${FIRECRAWL_BULL_AUTH_KEY:?set FIRECRAWL_BULL_AUTH_KEY}
  LOGGING_LEVEL: info
  ENV: local

services:
  searxng:
    image: ghcr.io/searxng/searxng@sha256:f433294b46a93564993c4371005341e013d94aa8ea4662d8ee521cd2cccb08e8
    container_name: searxng
    restart: unless-stopped
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    environment:
      SEARXNG_SECRET: ${SEARXNG_SECRET:?set SEARXNG_SECRET}
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=64m
    mem_limit: 512m
    healthcheck:
      test: [CMD-SHELL, "wget -qO- http://127.0.0.1:8080/healthz >/dev/null"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - agent-tools

  firecrawl-api:
    image: ghcr.io/firecrawl/firecrawl@sha256:ad3049ae703d6c6438211ee084e20fcf5eaa0f1cfef54351393df1ca6faff190
    container_name: firecrawl-api
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      <<: *firecrawl-environment
      HOST: 0.0.0.0
      PORT: "3002"
      EXTRACT_WORKER_PORT: "3004"
      WORKER_PORT: "3005"
      HARNESS_STARTUP_TIMEOUT_MS: "180000"
    command: node dist/src/harness.js --start-docker
    depends_on:
      firecrawl-postgres:
        condition: service_healthy
      firecrawl-redis:
        condition: service_healthy
      firecrawl-rabbitmq:
        condition: service_healthy
      firecrawl-playwright:
        condition: service_started
    mem_limit: 2g
    cpus: 2.0
    healthcheck:
      test: [CMD, node, -e, "fetch('http://127.0.0.1:3002/').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - agent-tools
      - web-research-backend

  firecrawl-playwright:
    image: ghcr.io/firecrawl/playwright-service@sha256:6359b0d9070f27400b4a9b615509be06919e40121fc1fdc42d4efeddf02653d2
    container_name: firecrawl-playwright
    restart: unless-stopped
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    environment:
      PORT: "3000"
      MAX_CONCURRENT_PAGES: "2"
      BLOCK_MEDIA: "true"
    tmpfs:
      - /tmp:rw,nosuid,nodev,size=512m
    shm_size: 512m
    mem_limit: 2g
    cpus: 1.5
    networks:
      - agent-tools
      - web-research-backend

  firecrawl-redis:
    image: redis:8-alpine
    container_name: firecrawl-redis
    restart: unless-stopped
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    command: redis-server --save "" --appendonly no --maxmemory 256mb --maxmemory-policy noeviction
    tmpfs:
      - /data:rw,nosuid,nodev,noexec,size=256m
    mem_limit: 320m
    healthcheck:
      test: [CMD, redis-cli, ping]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - web-research-backend

  firecrawl-rabbitmq:
    image: rabbitmq:3-alpine
    container_name: firecrawl-rabbitmq
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /var/lib/rabbitmq:rw,nosuid,nodev,noexec,size=256m
      - /tmp:rw,nosuid,nodev,noexec,size=32m
    mem_limit: 384m
    healthcheck:
      test: [CMD, rabbitmq-diagnostics, -q, check_running]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - web-research-backend

  firecrawl-postgres:
    image: ghcr.io/firecrawl/nuq-postgres@sha256:aed86f62858f29bd971abddcdeb301c12888098d2cf5d33c1ba42b053bc460f6
    container_name: firecrawl-postgres
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_USER: firecrawl
      POSTGRES_PASSWORD: ${FIRECRAWL_POSTGRES_PASSWORD:?set FIRECRAWL_POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - firecrawl_postgres:/var/lib/postgresql/data
    mem_limit: 768m
    healthcheck:
      test: [CMD-SHELL, "pg_isready -U firecrawl -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - web-research-backend

networks:
  agent-tools:
    name: agent-tools
  web-research-backend:
    internal: true

volumes:
  firecrawl_postgres:
