# Based on ydkn/avahi default config. Keep D-Bus disabled because the container does not mount host D-Bus.
[server]
host-name=docker
domain-name=local
use-ipv4=yes
use-ipv6=yes
allow-interfaces=eth0
enable-dbus=no
ratelimit-interval-usec=1000000
ratelimit-burst=1000

[wide-area]

[publish]
publish-hinfo=no
publish-workstation=no

[reflector]

[rlimits]
