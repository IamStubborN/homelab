services:
  karakeep-web:
    container_name: karakeep-web
    image: ghcr.io/karakeep-app/karakeep:${KARAKEEP_VERSION:-release}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      # By default, the data is stored in a docker volume called "data".
      # If you want to mount a custom directory, change the volume mapping to:
      # - /path/to/your/directory:/data
      - ./data/web:/data
    environment:
      MEILI_ADDR: http://meilisearch:7700
      BROWSER_WEB_URL: http://chrome:9222
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}

      OPENAI_BASE_URL: https://generativelanguage.googleapis.com/v1beta
      OPENAI_API_KEY: ${GEMINI_API_KEY}

      INFERENCE_TEXT_MODEL: gemini-2.5-flash
      INFERENCE_IMAGE_MODEL: gemini-2.5-flash
      
      # OLLAMA_BASE_URL: http://${OLLAMA_HOST_IP:-127.0.0.1}:11434 
      # INFERENCE_TEXT_MODEL: gemma3:latest
      # INFERENCE_IMAGE_MODEL: gemma3:latest 
      # EMBEDDING_TEXT_MODEL: gemma3:latest 

      INFERENCE_ENABLE_AUTO_SUMMARIZATION: true
      INFERENCE_JOB_TIMEOUT_SEC: 600
      INFERENCE_CONTEXT_LENGTH: 32768

      # Allow crawler to access internal hostnames
      CRAWLER_ALLOWED_INTERNAL_HOSTNAMES: freedium.${DOCKER_DOMAIN}

      # OPENAI_API_KEY: ...
      # You almost never want to change the value of the DATA_DIR variable.
      # If you want to mount a custom directory, change the volume mapping above instead.
      DATA_DIR: /data # DON'T CHANGE THIS
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "traefik.enable=true"
      - "traefik.http.routers.karakeep.tls=true"
      - "traefik.http.routers.karakeep.entrypoints=http,https"
      - "traefik.http.routers.karakeep.rule=Host(`karakeep.${DOCKER_DOMAIN}`)"
      - "traefik.http.services.karakeep.loadbalancer.server.port=3000"
    networks:
      - proxy

  chrome:
    container_name: karakeep-chrome
    image: gcr.io/zenika-hub/alpine-chrome:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command:
      - --no-sandbox
      - --disable-gpu
      - --disable-dev-shm-usage
      - --remote-debugging-address=0.0.0.0
      - --remote-debugging-port=9222
      - --hide-scrollbars
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

    networks:
      - proxy

  meilisearch:
    container_name: karakeep-meilisearch
    image: getmeili/meilisearch:v1
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
    volumes:
      - ./data/meilisearch:/meili_data
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

    networks:
      - proxy

networks:
  proxy:
    external: true
