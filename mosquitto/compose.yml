services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

    ports:
      - "${LAN_BIND_IP:-127.0.0.1}:1883:1883"
      - "${LAN_BIND_IP:-127.0.0.1}:1884:1884"
    volumes:
      - ./config:/mosquitto/config:ro
      - ./data:/mosquitto/data
      - ./log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 1883 && nc -z 127.0.0.1 1884"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
