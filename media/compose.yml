secrets:
  protonvpn_wireguard_private_key:
    file: ./secrets/protonvpn_wireguard_private_key
  plex_token:
    file: ./secrets/plex_token
  # Gluetun control-server auth: the TOML role file for Gluetun and the raw
  # apikey for the qBittorrent healthcheck. Both must carry the SAME key.
  # See gluetun/control-auth-config.example.toml and media/README.md.
  gluetun_control_auth_config:
    file: ./secrets/gluetun_control_auth_config
  gluetun_control_api_key:
    file: ./secrets/gluetun_control_api_key

networks:
  proxy:
    external: true
